<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS variables based strictly on your colorPallet.pdf */
        :root {
            --arctic-powder: #F1F6F4;
            --mystic-mint: #D9E8E2;
            --forsythia: #FFC801;
            --deep-saffron: #FF9932;
            --nocturnal-expedition: #114C5A;
            --oceanic-noir: #172836;
            
            --font-header: 'JetBrains Mono', monospace;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--arctic-powder);
            color: var(--oceanic-noir);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar styling using Deep UI elements */
        .sidebar {
            width: 260px;
            background-color: var(--oceanic-noir);
            color: var(--arctic-powder);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-header);
            font-size: 1.2rem;
            color: var(--forsythia);
            padding-bottom: 20px;
            border-bottom: 1px solid var(--nocturnal-expedition);
        }

        .brand img {
            width: 24px;
            height: 24px;
        }

        .nav-links {
            list-style: none;
            margin-top: 20px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: background 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--nocturnal-expedition);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-left img, .nav-item > img {
            width: 20px;
            height: 20px;
        }

        /* Main Content Area */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Top Header Navigation */
        .top-nav {
            background-color: #ffffff;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid var(--mystic-mint);
        }

        .search-bar {
            display: flex;
            align-items: center;
            background-color: var(--arctic-powder);
            padding: 8px 14px;
            border-radius: 20px;
            width: 300px;
        }

        .search-bar img {
            width: 18px;
            height: 18px;
            margin-right: 8px;
        }

        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-family: var(--font-body);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .top-actions img {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* Dashboard Grid Content */
        .content {
            padding: 30px;
        }

        .page-title {
            font-family: var(--font-header);
            font-size: 1.8rem;
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Cards utilizing primary & accent system colors */
        .card {
            background-color: #ffffff;
            border-left: 5px solid var(--deep-saffron);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card.accent {
            border-left-color: var(--forsythia);
        }

        .card-info h3 {
            font-size: 0.9rem;
            color: #777;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card-info p {
            font-family: var(--font-header);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .card-icon-box {
            background-color: var(--arctic-powder);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon-box img {
            width: 24px;
            height: 24px;
        }

        /* Banner Notification Alert block using Mystic Mint context background */
        .alert-banner {
            background-color: var(--mystic-mint);
            border: 1px solid var(--nocturnal-expedition);
            padding: 15px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .alert-text {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert-text img {
            width: 20px;
            height: 20px;
        }

        .alert-banner .close-btn {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <div class="brand">
                <img src="/cube-16-solid.svg" alt="Brand Logo">
                <span>TECH.OS</span>
            </div>
            
            <ul class="nav-links">
                <li class="nav-item active">
                    <div class="nav-left">
                        <img src="/chart-pie.svg" alt="Dashboard">
                        <span>Analytics</span>
                    </div>
                    <img src="/chevron-right.svg" alt="Go">
                </li>
                <li class="nav-item">
                    <div class="nav-left">
                        <img src="/arrow-path.svg" alt="Sync">
                        <span>Deployments</span>
                    </div>
                    <img src="/chevron-down.svg" alt="Expand">
                </li>
                <li class="nav-item">
                    <div class="nav-left">
                        <img src="/link.svg" alt="Connections">
                        <span>Integrations</span>
                    </div>
                    <img src="/chevron-up.svg" alt="Collapse">
                </li>
            </ul>
        </div>

        <div class="nav-item">
            <div class="nav-left">
                <img src="/cog-8-tooth.svg" alt="Settings">
                <span>System Settings</span>
            </div>
        </div>
    </aside>

    <main class="main-container">
        
        <header class="top-nav">
            <div class="search-bar">
                <img src="/search.svg" alt="Search">
                <input type="text" placeholder="Search tracks or components...">
            </div>
            <div class="top-actions">
                <img src="/arrow-path (1).svg" alt="Refresh UI">
                <img src="/link-solid.svg" alt="Copy Quick Link">
            </div>
        </header>

        <section class="content">
            <h1 class="page-title">Operational Overview</h1>

            <div class="alert-banner">
                <div class="alert-text">
                    <img src="/chevron-up-solid.svg" alt="Priority Up">
                    <span><strong>System Status:</strong> All pipelines running efficiently using specified theme palettes.</span>
                </div>
                <img src="/x-mark.svg" class="close-btn" alt="Dismiss Alert">
            </div>

            <div class="grid">
                <div class="card">
                    <div class="card-info">
                        <h3>Growth Index</h3>
                        <p>+24.8%</p>
                    </div>
                    <div class="card-icon-box">
                        <img src="/arrow-trending-up.svg" alt="Growth Trend">
                    </div>
                </div>

                <div class="card accent">
                    <div class="card-info">
                        <h3>Previous Bounds</h3>
                        <p>Floor -04</p>
                    </div>
                    <div class="card-icon-box">
                        <img src="/chevron-left.svg" alt="Backtracking">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
